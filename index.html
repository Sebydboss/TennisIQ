<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tennis IQ</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #050505;
      --text: #ffffff;
      --accent: #a3ff12;
      --card: #111111;
      --muted: #9ca3af;
      --heading: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
      font-family: ui-sans-serif;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .accent {
      background: var(--accent);
      color: black;
      font-weight: 600;
    }

    .muted {
      color: var(--muted);
    }

    h1, h2, h3 {
      color: var(--heading);
    }
  </style>
</head>

<body>

<div class="flex justify-between items-center px-8 py-5 border-b border-gray-800">
  <h1 class="text-xl font-bold">Tennis IQ</h1>

  <select onchange="setTheme(this.value)" class="bg-gray-900 text-white px-3 py-1 rounded">
    <option value="stadium">Stadium</option>
    <option value="grass">Grass</option>
    <option value="clay">Clay</option>
    <option value="minimal">Minimal</option>
  </select>
</div>

<div class="text-center mt-20 px-6">
  <h2 class="text-5xl font-bold">AI-powered tennis intelligence</h2>

  <p class="muted mt-4 max-w-xl mx-auto text-lg">
    Upload your serve. Get instant breakdowns.
  </p>
</div>

<!-- UPLOAD -->
<div class="mt-16 flex justify-center">
  <div class="card p-8 w-96 text-center">

    <input type="file" id="videoInput" accept="video/*" onchange="handleUpload()">

    <video id="preview" class="mt-4 w-full hidden rounded-lg" controls></video>

  </div>
</div>

<!-- FEATURES (fixed order) -->
<div class="mt-16 grid md:grid-cols-3 gap-6 px-10 text-center">

  <div class="card p-6">
    🎯 Serve Breakdown
  </div>

  <div class="card p-6">
    ⚡ Instant Feedback
  </div>

  <div class="card p-6">
    🧠 Pro Comparison
  </div>

</div>

<script>
async function handleUpload() {
  const file = document.getElementById("videoInput").files[0];
  const video = document.getElementById("preview");

  if (!file) return;

  // show preview
  video.src = URL.createObjectURL(file);
  video.classList.remove("hidden");

  // send to backend
  const formData = new FormData();
  formData.append("file", file);

  await fetch("http://localhost:8000/analyze", {
    method: "POST",
    body: formData
  });

  // redirect
  setTimeout(() => {
    window.location.href = "results.html";
  }, 1500);
}

/* THEME SYSTEM */
function setTheme(theme) {
  const root = document.documentElement;

  if (theme === "stadium") {
    root.style.setProperty("--bg", "#050505");
    root.style.setProperty("--accent", "#a3ff12");
    root.style.setProperty("--card", "#111111");
    root.style.setProperty("--muted", "#b3b3b3");
  }

  if (theme === "grass") {
    root.style.setProperty("--bg", "#0b2e13");
    root.style.setProperty("--accent", "#22c55e");
    root.style.setProperty("--card", "#0f3d1f");
    root.style.setProperty("--muted", "#b7f7c1");
  }

  if (theme === "clay") {
    root.style.setProperty("--bg", "#2a140b");
    root.style.setProperty("--accent", "#ff7a18");
    root.style.setProperty("--card", "#3a1c10");
    root.style.setProperty("--muted", "#ffd1b3");
  }

  if (theme === "minimal") {
    root.style.setProperty("--bg", "#ffffff");
    root.style.setProperty("--accent", "#000000");
    root.style.setProperty("--card", "#f3f3f3");
    root.style.setProperty("--muted", "#555");
  }
}
</script>

</body>
</html>
